version: '3.8'

services:
  backend:
    build: ./miniapp/backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - ./miniapp/backend:/app
    restart: unless-stopped
    
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./miniapp/frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped